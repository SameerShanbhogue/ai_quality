name: ML Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linter
        run: pip install flake8

      - name: Run flake8 on class2
        run: |
          flake8 class2/api_simple.py class2/api_multimodel.py \
            --max-line-length 120 \
            --ignore E501,W503,E402

      - name: Run flake8 on test files
        run: |
          flake8 class2/test_part1.py class2/test_part3.py \
            --max-line-length 120 \
            --ignore E501,W503,E402

  test:
    name: Run pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r class2/requirements-api.txt

      - name: Run Part 1 tests (api_simple)
        working-directory: class2
        run: pytest test_part1.py -v --tb=short

      - name: Run Part 3 tests (api_multimodel)
        working-directory: class2
        run: pytest test_part3.py -v --tb=short
